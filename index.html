<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>优化版创造力生态图谱 - 视觉增强</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
font-family:Arial, sans-serif;
background: linear-gradient(135deg, #f0f3f5 0%, #e6ebef 100%);
margin:0;
padding:20px;
text-align:center;
}

.container{
max-width:1000px;
margin:20px auto;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.15);
position:relative;
overflow:hidden;
}

.container::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 8px;
    background: linear-gradient(90deg, #2e7d32, #2196f3, #e53935, #757575);
    border-radius: 20px 20px 0 0;
}

h1{
margin-bottom:10px;
color:#2c3e50;
font-size: 2.5em;
text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
}

.description{
color:#7f8c8d;
margin-bottom: 30px;
font-size: 1.1em;
}

.question{
text-align:left;
margin:25px 0;
padding: 15px;
border-radius: 12px;
transition: all 0.3s ease;
position: relative;
}

.question:hover {
    background-color: #f8f9fa;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.question::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: linear-gradient(to bottom, #2e7d32, #2196f3, #e53935, #757575);
    border-radius: 12px 0 0 12px;
}

.question.forest { border-left: 4px solid #2e7d32; }
.question.river { border-left: 4px solid #2196f3; }
.question.volcano { border-left: 4px solid #e53935; }
.question.mountain { border-left: 4px solid #757575; }

.scale{
display:flex;
justify-content:space-between;
margin-top:12px;
}

.scale label {
    flex: 1;
    text-align: center;
    padding: 8px;
    margin: 0 3px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    background: #f8f9fa;
    border: 1px solid #e9ecef;
}

.scale input[type="radio"] {
    display: none;
}

.scale label:hover {
    background: #e9ecef;
    transform: scale(1.05);
}

.scale input[type="radio"]:checked + label {
    background: #2e7d32;
    color: white;
    font-weight: bold;
    transform: scale(1.1);
    box-shadow: 0 4px 8px rgba(46, 125, 50, 0.3);
}

button{
margin-top:30px;
padding:16px 32px;
font-size:18px;
background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
color:white;
border:none;
border-radius:12px;
cursor:pointer;
transition: all 0.3s ease;
box-shadow: 0 6px 15px rgba(46, 125, 50, 0.4);
font-weight: bold;
letter-spacing: 0.5px;
}

button:hover{
transform: translateY(-3px);
box-shadow: 0 10px 25px rgba(46, 125, 50, 0.6);
}

button:active{
transform: translateY(1px);
}

#radarChartContainer {
    margin: 40px 0;
    padding: 20px;
    background: #f8f9fa;
    border-radius: 16px;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
}

#map{
margin-top:40px;
height:300px;
border-radius:16px;
position:relative;
overflow:hidden;
background: linear-gradient(135deg, #e6ecef 0%, #dce1e5 100%);
border: 2px solid #d1d8dd;
box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
}

.score-display {
    display: flex;
    justify-content: space-around;
    margin: 20px 0;
    flex-wrap: wrap;
}

.dimension-card {
    background: white;
    border-radius: 12px;
    padding: 15px;
    margin: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    flex: 1;
    min-width: 200px;
    transition: all 0.3s ease;
}

.dimension-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.dimension-title {
    font-weight: bold;
    margin-bottom: 8px;
    font-size: 1.1em;
}

.dimension-score {
    font-size: 1.8em;
    font-weight: bold;
}

.result{
margin-top:30px;
font-size:18px;
line-height:1.6;
padding: 20px;
border-radius: 12px;
background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
border: 1px solid #dee2e6;
}

.result h2 {
    color: #2c3e50;
    margin-top: 0;
}

.save-btn {
    background: linear-gradient(135deg, #673ab7 0%, #4527a0 100%);
    margin-top: 20px;
}

.save-btn:hover {
    box-shadow: 0 10px 25px rgba(103, 58, 183, 0.6);
}

.legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 20px 0;
    flex-wrap: wrap;
}

.legend-item {
    display: flex;
    align-items: center;
    margin: 5px;
}

.legend-color {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    margin-right: 8px;
}

.forest-color { background-color: #2e7d32; }
.river-color { background-color: #2196f3; }
.volcano-color { background-color: #e53935; }
.mountain-color { background-color: #757575; }
</style>
</head>

<body>
<div class="container" id="app">
<h1>创造力生态图谱</h1>
<p class="description">回答问题，生成你的创造生态</p>

<div class="legend">
    <div class="legend-item">
        <div class="legend-color forest-color"></div>
        <span>森林(感知)</span>
    </div>
    <div class="legend-item">
        <div class="legend-color river-color"></div>
        <span>河流(连接)</span>
    </div>
    <div class="legend-item">
        <div class="legend-color volcano-color"></div>
        <span>火山(创新)</span>
    </div>
    <div class="legend-item">
        <div class="legend-color mountain-color"></div>
        <span>山脉(结构)</span>
    </div>
</div>

<div id="questions"></div>

<button onclick="calculate()">生成创造图谱</button>

<div id="radarChartContainer">
    <canvas id="radarChart"></canvas>
</div>

<div class="score-display">
    <div class="dimension-card">
        <div class="dimension-title">森林 (感知)</div>
        <div id="forest-score" class="dimension-score">-</div>
    </div>
    <div class="dimension-card">
        <div class="dimension-title">河流 (连接)</div>
        <div id="river-score" class="dimension-score">-</div>
    </div>
    <div class="dimension-card">
        <div class="dimension-title">火山 (创新)</div>
        <div id="volcano-score" class="dimension-score">-</div>
    </div>
    <div class="dimension-card">
        <div class="dimension-title">山脉 (结构)</div>
        <div id="mountain-score" class="dimension-score">-</div>
    </div>
</div>

<div id="map"></div>

<div id="result" class="result"></div>

<button class="save-btn" onclick="download()">保存结果图片</button>
</div>

<script>
const questions=[
    // 感知维度 (Forest)
    "我经常注意到别人忽略的细节",
    "光线或材质变化会吸引我",
    "观察环境会激发创意",
    "我喜欢记录生活细节",
    "进入空间会观察结构",
    "细节是创作来源",

    // 连接维度 (River)
    "我喜欢连接不同领域",
    "不相关事物会形成联系",
    "跨学科内容激发灵感",
    "喜欢组合不同媒介",
    "创意来自元素重组",
    "从多个角度理解问题",

    // 创新维度 (Volcano)
    "我经常产生新想法",
    "尝试未知方法让我兴奋",
    "喜欢实验新方式",
    "打破规则产生创造",
    "行动会产生灵感",
    "愿意尝试未成熟想法",

    // 结构维度 (Mountain)
    "我会思考创作结构",
    "喜欢建立框架",
    "会整理想法",
    "结构让作品清晰",
    "考虑部分关系",
    "喜欢秩序设计"
]

const container=document.getElementById("questions")
questions.forEach((q,i)=>{
    let div=document.createElement("div")
    div.className="question"
    
    const dimensionIndex = Math.floor(i/6)
    const dimensionNames = ['forest', 'river', 'volcano', 'mountain']
    div.classList.add(dimensionNames[dimensionIndex])
    
    let dimName = ["森林(感知)", "河流(连接)", "火山(创新)", "山脉(结构)"][Math.floor(i/6)]
    
    let html=`<p>${i+1}. ${q} <small style="color:#7f8c8d;">[${dimName}]</small></p><div class="scale">`
    
    for(let s=1;s<=5;s++){
        html+=`
        <label>
            <input type="radio" name="q${i}" value="${s}">
            ${s}
        </label>
        `
    }
    
    html+="</div>"
    div.innerHTML=html
    container.appendChild(div)
})

function calculate(){
    let scores=[0,0,0,0]
    
    for(let i=0;i<24;i++){
        let radios=document.getElementsByName("q"+i)
        
        for(let r of radios){
            if(r.checked){
                let group=Math.floor(i/6)
                scores[group]+=parseInt(r.value)
            }
        }
    }
    
    let avg=scores.map(s=>s/6)
    
    // 更新分数显示
    document.getElementById("forest-score").textContent = avg[0].toFixed(2)
    document.getElementById("river-score").textContent = avg[1].toFixed(2)
    document.getElementById("volcano-score").textContent = avg[2].toFixed(2)
    document.getElementById("mountain-score").textContent = avg[3].toFixed(2)
    
    drawChart(avg)
    drawMap(avg)
    showResult(avg)
}

function drawChart(data){
    const ctx = document.getElementById("radarChart");
    
    // 如果图表已存在，先销毁
    if (window.myChart) {
        window.myChart.destroy();
    }
    
    window.myChart = new Chart(ctx, {
        type: "radar",
        data: {
            labels: ["森林(感知)", "河流(连接)", "火山(创新)", "山脉(结构)"],
            datasets: [{
                label: "创造力结构",
                data: data,
                backgroundColor: 'rgba(46, 125, 50, 0.2)',
                borderColor: 'rgba(46, 125, 50, 1)',
                pointBackgroundColor: [
                    'rgba(46, 125, 50, 1)',    // 森林
                    'rgba(33, 150, 243, 1)',   // 河流
                    'rgba(229, 57, 53, 1)',    // 火山
                    'rgba(117, 117, 117, 1)'   // 山脉
                ],
                pointBorderColor: '#fff',
                pointHoverBackgroundColor: '#fff',
                pointHoverBorderColor: [
                    'rgba(46, 125, 50, 1)',
                    'rgba(33, 150, 243, 1)',
                    'rgba(229, 57, 53, 1)',
                    'rgba(117, 117, 117, 1)'
                ],
                borderWidth: 2,
                pointRadius: 6,
                pointHoverRadius: 8
            }]
        },
        options: {
            scales: {
                r: {
                    min: 1,
                    max: 5,
                    ticks: {
                        stepSize: 1,
                        backdropColor: 'rgba(255, 255, 255, 0.8)',
                        color: '#2c3e50'
                    },
                    grid: {
                        color: 'rgba(0, 0, 0, 0.1)'
                    },
                    angleLines: {
                        color: 'rgba(0, 0, 0, 0.1)'
                    },
                    pointLabels: {
                        font: {
                            size: 14,
                            weight: 'bold'
                        },
                        color: '#2c3e50'
                    }
                }
            },
            plugins: {
                legend: {
                    display: false
                },
                tooltip: {
                    backgroundColor: 'rgba(255, 255, 255, 0.9)',
                    titleColor: '#2c3e50',
                    bodyColor: '#2c3e50',
                    borderColor: '#ddd',
                    borderWidth: 1
                }
            }
        }
    })
}

function drawMap(avg){
    let map=document.getElementById("map")
    map.innerHTML = ""
    
    // 创建一个渐变背景
    const gradient = document.createElement('div')
    gradient.style.position = 'absolute'
    gradient.style.top = '0'
    gradient.style.left = '0'
    gradient.style.width = '100%'
    gradient.style.height = '100%'
    gradient.style.background = 'radial-gradient(circle at center, rgba(230, 236, 239, 0.8), rgba(220, 225, 229, 1))'
    gradient.style.zIndex = '0'
    map.appendChild(gradient)
    
    // 根据分数绘制生态系统元素
    const forestScore = avg[0]
    const riverScore = avg[1]
    const volcanoScore = avg[2]
    const mountainScore = avg[3]
    
    // 森林 - 左侧绿色区域
    if(forestScore > 1.5) {
        const forestHeight = Math.min(100, (forestScore - 1.5) * 25)
        const forestWidth = 150 + (forestScore * 10)
        const forestOpacity = Math.min(1, forestScore / 5)
        
        const forest = document.createElement('div')
        forest.style.position = 'absolute'
        forest.style.bottom = '0'
        forest.style.left = '10%'
        forest.style.width = `${forestWidth}px`
        forest.style.height = `${forestHeight}px`
        forest.style.background = `linear-gradient(to top, rgba(46, 125, 50, ${forestOpacity}), rgba(38, 83, 42, ${forestOpacity}))`
        forest.style.borderRadius = '10px 10px 0 0'
        forest.style.opacity = forestOpacity
        forest.style.zIndex = '1'
        forest.title = `森林: ${forestScore.toFixed(2)}`
        map.appendChild(forest)
        
        // 添加树木装饰
        for(let i = 0; i < Math.floor(forestScore * 2); i++) {
            const tree = document.createElement('div')
            tree.style.position = 'absolute'
            tree.style.bottom = `${forestHeight}px`
            tree.style.left = `${15 + Math.random() * 30}%`
            tree.style.width = '4px'
            tree.style.height = `${Math.random() * 30 + 20}px`
            tree.style.backgroundColor = '#2e7d32'
            tree.style.borderRadius = '2px'
            tree.style.zIndex = '2'
            map.appendChild(tree)
            
            const leaves = document.createElement('div')
            leaves.style.position = 'absolute'
            leaves.style.bottom = `${forestHeight + Math.random() * 10 + 20}px`
            leaves.style.left = `${15 + Math.random() * 30 - 2}%`
            leaves.style.width = '20px'
            leaves.style.height = '20px'
            leaves.style.backgroundColor = '#4caf50'
            leaves.style.borderRadius = '50%'
            leaves.style.zIndex = '2'
            map.appendChild(leaves)
        }
    }
    
    // 河流 - 中央蓝色线条
    if(riverScore > 1.5) {
        const riverWidth = Math.min(20, (riverScore - 1.5) * 5)
        const riverOpacity = Math.min(0.8, riverScore / 5)
        const riverPosition = 100 + (riverScore * 10)
        
        const river = document.createElement('div')
        river.style.position = 'absolute'
        river.style.top = `${riverPosition}px`
        river.style.left = '0'
        river.style.width = '100%'
        river.style.height = `${riverWidth}px`
        river.style.background = `linear-gradient(90deg, rgba(33, 150, 243, 0), rgba(33, 150, 243, ${riverOpacity}), rgba(33, 150, 243, 0))`
        river.style.zIndex = '3'
        river.title = `河流: ${riverScore.toFixed(2)}`
        map.appendChild(river)
        
        // 添加波纹效果
        for(let i = 0; i < Math.floor(riverScore * 3); i++) {
            const ripple = document.createElement('div')
            ripple.style.position = 'absolute'
            ripple.style.top = `${riverPosition - 5}px`
            ripple.style.left = `${Math.random() * 100}%`
            ripple.style.width = '2px'
            ripple.style.height = '10px'
            ripple.style.backgroundColor = 'rgba(33, 150, 243, 0.6)'
            ripple.style.borderRadius = '50%'
            ripple.style.zIndex = '3'
            map.appendChild(ripple)
        }
    }
    
    // 火山 - 右上方红色三角形
    if(volcanoScore > 1.5) {
        const volcanoSize = Math.min(80, (volcanoScore - 1.5) * 20)
        const volcanoOpacity = Math.min(1, volcanoScore / 5)
        
        const volcano = document.createElement('div')
        volcano.style.position = 'absolute'
        volcano.style.bottom = '80px'
        volcano.style.right = '20%'
        volcano.style.width = '0'
        volcano.style.height = '0'
        volcano.style.borderLeft = `${volcanoSize/2}px solid transparent`
        volcano.style.borderRight = `${volcanoSize/2}px solid transparent`
        volcano.style.borderBottom = `${volcanoSize}px solid rgba(229, 57, 53, ${volcanoOpacity})`
        volcano.style.opacity = volcanoOpacity
        volcano.style.zIndex = '4'
        volcano.title = `火山: ${volcanoScore.toFixed(2)}`
        map.appendChild(volcano)
        
        // 添加烟雾效果
        if(volcanoScore > 3) {
            const smoke = document.createElement('div')
            smoke.style.position = 'absolute'
            smoke.style.bottom = `${80 + volcanoSize}px`
            smoke.style.right = `${20 - 2}%`
            smoke.style.width = '20px'
            smoke.style.height = '30px'
            smoke.style.background = 'radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(200,200,200,0.4) 100%)'
            smoke.style.borderRadius = '50%'
            smoke.style.zIndex = '5'
            smoke.style.animation = 'smokeRise 3s infinite alternate'
            map.appendChild(smoke)
        }
    }
    
    // 山脉 - 底部灰色三角形
    if(mountainScore > 1.5) {
        const mountainSize = Math.min(120, (mountainScore - 1.5) * 30)
        const mountainOpacity = Math.min(1, mountainScore / 5)
        
        const mountain = document.createElement('div')
        mountain.style.position = 'absolute'
        mountain.style.bottom = '0'
        mountain.style.left = '60%'
        mountain.style.width = '0'
        mountain.style.height = '0'
        mountain.style.borderLeft = `${mountainSize/2}px solid transparent`
        mountain.style.borderRight = `${mountainSize/2}px solid transparent`
        mountain.style.borderBottom = `${mountainSize}px solid rgba(117, 117, 117, ${mountainOpacity})`
        mountain.style.opacity = mountainOpacity
        mountain.style.zIndex = '6'
        mountain.title = `山脉: ${mountainScore.toFixed(2)}`
        map.appendChild(mountain)
        
        // 添加雪顶
        if(mountainScore > 3) {
            const snow = document.createElement('div')
            snow.style.position = 'absolute'
            snow.style.bottom = `${mountainSize}px`
            snow.style.left = `${60 - 3}%`
            snow.style.width = '30px'
            snow.style.height = '15px'
            snow.style.background = 'linear-gradient(to bottom, white, #e0e0e0)'
            snow.style.borderRadius = '50%'
            snow.style.zIndex = '7'
            map.appendChild(snow)
        }
    }
    
    // 添加分数标签
    const labels = [
        {text: `森林: ${forestScore.toFixed(2)}`, color: '#2e7d32', pos: 'top', left: '10%'},
        {text: `河流: ${riverScore.toFixed(2)}`, color: '#2196f3', pos: 'top', left: '40%'},
        {text: `火山: ${volcanoScore.toFixed(2)}`, color: '#e53935', pos: 'top', left: '70%'},
        {text: `山脉: ${mountainScore.toFixed(2)}`, color: '#757575', pos: 'top', left: '90%'}
    ]
    
    labels.forEach(label => {
        const labelEl = document.createElement('div')
        labelEl.textContent = label.text
        labelEl.style.position = 'absolute'
        labelEl.style[label.pos] = '10px'
        labelEl.style.left = label.left
        labelEl.style.transform = 'translateX(-50%)'
        labelEl.style.background = 'rgba(255,255,255,0.8)'
        labelEl.style.padding = '5px 10px'
        labelEl.style.borderRadius = '10px'
        labelEl.style.fontWeight = 'bold'
        labelEl.style.color = label.color
        labelEl.style.fontSize = '14px'
        labelEl.style.boxShadow = '0 2px 5px rgba(0,0,0,0.1)'
        labelEl.style.zIndex = '10'
        map.appendChild(labelEl)
    })
    
    // 添加动画效果
    const style = document.createElement('style')
    style.textContent = `
        @keyframes smokeRise {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            100% { transform: translateY(-30px) scale(1.2); opacity: 0.3; }
        }
    `
    document.head.appendChild(style)
}

function showResult(avg){
    // 计算各维度间的差异
    let sortedAvg = [...avg].sort((a, b) => b - a)
    let maxDiff = sortedAvg[0] - sortedAvg[3]  // 最大值与最小值差
    
    // 如果最大差异小于阈值，认为是均衡型
    if(maxDiff < 0.5) {
        document.getElementById("result").innerHTML = 
        "<h2>复合创造者</h2><p>你的创造结构呈现均衡状态，各维度发展相对平衡，具备综合创造力</p>"
        return
    }
    
    // 计算前两名
    let index=[0,1,2,3].sort((a,b)=>avg[b]-avg[a])
    let first=index[0]
    let second=index[1]
    
    // 检查主次维度差异是否足够大
    let primaryThreshold = 0.4  // 主次维度至少相差0.4
    if(avg[first] - avg[second] < primaryThreshold) {
        document.getElementById("result").innerHTML = 
        "<h2>复合创造者</h2><p>你的创造结构呈现均衡状态，各维度发展相对平衡，具备综合创造力</p>"
        return
    }
    
    // 检查绝对分数阈值
    if(avg[first] < 3.0) {
        document.getElementById("result").innerHTML = 
        "<h2>潜质创造者</h2><p>你的创造力有待进一步发掘，在主要维度上还有提升空间</p>"
        return
    }
    
    const types={
        "0-1":["感知诗人","观察与连接让你的创造像森林中的河流"],
        "1-2":["概念炼金术士","思想在不同领域之间发生化学反应"],
        "2-3":["世界建造者","你能构建完整系统与结构"],
        "0-2":["实验探索者","观察与行动不断生成新创意"],
        "1-3":["结构策展人","你擅长整合思想并构建秩序"],
        "0-3":["秩序观察者","你在观察世界中建立结构"],
        "2-1":["行动思想家","实践不断生成新的概念"],
        "3-2":["系统创造者","结构与生成形成强大创造力"]
    }

    let key=`${first}-${second}`

    document.getElementById("result").innerHTML=
    "<h2>"+type[0]+"</h2><p>"+type[1]+"</p>"
}
