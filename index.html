<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>你创造力生态图谱</title>
<style>
body{
  font-family: Arial;
  background: #f0f3f5;
  margin: 0;
  padding: 40px;
  text-align: center;
}
.container{
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 40px;
  border-radius: 14px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.1);
}
h1,h2{margin-bottom:10px;}
.question{text-align:left;margin:20px 0;}
.scale{display:flex;justify-content:space-between;margin-top:6px;}
button{
  margin-top:30px;
  padding:14px 24px;
  font-size:16px;
  background:#2e7d32;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
#map{
  margin-top:40px;
  height:260px;
  border-radius:12px;
  position:relative;
  overflow:hidden;
  background:#e6ecef;
}
.layer{
  position:absolute;
  bottom:0;
  width:60px;
  transition: all 1s ease;
  border-radius: 6px 6px 0 0;
}
.layer span{
  position:absolute;
  top:-24px;
  left:50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 12px;
  display: none;
}
.layer:hover span{display:block;}
.result{
  margin-top:30px;
  font-size:16px;
  line-height:1.6;
  text-align:left;
}
</style>
</head>
<body>
<div class="container" id="app">
<h1>创造力生态图谱</h1>
<p>回答 24 个问题，探索你的创造力生态。</p>
<div id="questions"></div>
<button onclick="calculate()">生成生态图</button>
<div id="map"></div>
<div id="result" class="result"></div>
<button onclick="download()">保存报告图片</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
// 题目
const questions=[
"我经常注意到别人忽略的细节",
"光线或材质变化会吸引我",
"观察环境会激发创意",
"我喜欢记录生活细节",
"进入空间会观察结构",
"细节是创作来源",
"我喜欢连接不同领域",
"不相关事物会形成联系",
"跨学科内容激发灵感",
"喜欢组合不同媒介",
"创意来自元素重组",
"从多个角度理解问题",
"我经常产生新想法",
"尝试未知方法让我兴奋",
"喜欢实验新方式",
"打破规则产生创造",
"行动会产生灵感",
"愿意尝试未成熟想法",
"我会思考创作结构",
"喜欢建立框架",
"会整理想法",
"结构让作品清晰",
"考虑部分关系",
"喜欢秩序设计"
];

const container=document.getElementById("questions");
questions.forEach((q,i)=>{
  let div=document.createElement("div");
  div.className="question";
  let html=`<p>${i+1}. ${q}</p><div class="scale">`;
  for(let s=1;s<=5;s++){
    html+=`<label><input type="radio" name="q${i}" value="${s}">${s}</label>`;
  }
  html+="</div>";
  div.innerHTML=html;
  container.appendChild(div);
});

// 八种原型
const prototypes={
"0-1":{name:"感知诗人",type:"观察与连接",style:"细致观察与意义连接",risk:"过度敏感、犹豫不决",advice:"尝试将观察转化为行动，积累作品",artists:"莫奈、林风眠"},
"1-2":{name:"概念炼金术士",type:"整合与生成",style:"跨领域概念创新",risk:"过度理论化、脱离实践",advice:"将概念落地于具体创作",artists:"达利、草间弥生"},
"2-3":{name:"世界建造者",type:"生成与结构",style:"系统构建与完整世界",risk:"过度复杂、行动缓慢",advice:"关注细节与感官体验",artists:"宫崎骏、Escher"},
"0-2":{name:"实验探索者",type:"观察与生成",style:"实践中观察与创造",risk:"缺乏体系性",advice:"建立创作框架",artists:"约瑟夫·博伊斯"},
"1-3":{name:"结构策展人",type:"整合与结构",style:"整合思想与秩序建构",risk:"过于规整、缺乏激情",advice:"加入意外元素与实验",artists:"贝聿铭"},
"0-3":{name:"秩序观察者",type:"观察与结构",style:"观察世界与建立秩序",risk:"谨慎过度、创造力保守",advice:"尝试实验和跨界合作",artists:"北斋"},
"2-1":{name:"行动思想家",type:"生成与整合",style:"实践中连接新概念",risk:"冲动、粗糙",advice:"反思总结经验",artists:"安迪·沃霍尔"},
"3-2":{name:"系统创造者",type:"结构与生成",style:"系统构建与创意爆发",risk:"复杂难控",advice:"简化流程、逐步迭代",artists:"扎哈·哈迪德"}
};

// 生成结果
function calculate(){
  let scores=[0,0,0,0];
  for(let i=0;i<24;i++){
    let radios=document.getElementsByName("q"+i);
    for(let r of radios){
      if(r.checked){
        scores[Math.floor(i/6)]+=parseInt(r.value);
      }
    }
  }
  let avg=scores.map(s=>s/6);
  drawDynamicMap(avg);
  showReport(avg);
}

// 动态生态图
function drawDynamicMap(avg){
  const map=document.getElementById("map");
  map.innerHTML="";
  const elements=[
    {value:avg[0],color:"#2e7d32",label:"森林"},
    {value:avg[1],color:"#2196f3",label:"河流"},
    {value:avg[2],color:"#e53935",label:"火山"},
    {value:avg[3],color:"#757575",label:"山脉"}
  ];
  elements.forEach((el,i)=>{
    let div=document.createElement("div");
    div.className="layer";
    div.style.left=(i*100+50)+"px";
    div.style.height="0px";
    div.style.background=el.color;
    div.setAttribute("data-score",`${el.label}: ${el.value.toFixed(1)}`);
    let span=document.createElement("span");
    span.innerText=`${el.label}: ${el.value.toFixed(1)}`;
    div.appendChild(span);
    map.appendChild(div);
    // 动画渐升
    setTimeout(()=>{
      div.style.height=(el.value*40)+"px";
    }, i*200);
  });
}

// 报告显示
function showReport(avg){
  let index=[0,1,2,3].sort((a,b)=>avg[b]-avg[a]);
  let first=index[0],second=index[1];
  let key=`${first}-${second}`;
  let p=prototypes[key] || {name:"复合创造者",type:"均衡",style:"四维度均衡发挥",risk:"缺乏突出方向",advice:"根据兴趣强化维度",artists:"无"};
  document.getElementById("result").innerHTML=
    `<h2>${p.name}</h2>
    <p><b>创造气质：</b>${p.style}</p>
    <p><b>创造方式：</b>${p.type}</p>
    <p><b>潜在风险：</b>${p.risk}</p>
    <p><b>发展建议：</b>${p.advice}</p>
    <p><b>代表艺术家：</b>${p.artists}</p>`;
}

// 保存图片
function download(){
  html2canvas(document.getElementById("app")).then(canvas=>{
    let link=document.createElement("a");
    link.download="creativity-ecology-dynamic.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}
</script>
</body>
</html>
